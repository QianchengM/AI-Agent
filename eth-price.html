  <script type=module>
      let ethChart = null;
    const fetchEthPrices = async (days = 30) => {
      const resp = await fetch(
        'https://api.coingecko.com/api/v3/coins/ethereum/market_chart?vs_currency=usd&days=' + days
      );
      if (!resp.ok) throw new Error('无法获取价格数据');
      return await resp.json();
    };

    const buildLabelsAndValues = (prices) => {
      const formatter = new Intl.DateTimeFormat('zh-CN', { month: 'numeric', day: 'numeric' });
      // const labels = prices.map((point) => formatter.format(new Date(point[0])));
      // const values = prices.map((point) => Number(point[1].toFixed(2)));
      // return { labels, values };
      const map = new Map(); // 用 Map 去重，只保留每天最后一条数据
      prices.forEach(([ts, price]) => {
      const dateStr = formatter.format(new Date(ts));
      map.set(dateStr, Number(price.toFixed(2))); // 同一天会被覆盖
      });
      return {
        labels: Array.from(map.keys()),
        values: Array.from(map.values())
      };
    };
    const calcStats = (values) => {
      const sum = values.reduce((acc, val) => acc + val, 0);
      const min = Math.min(...values);
      const max = Math.max(...values);
      return { min, max, avg: sum / values.length };
    };

    const renderTrend = async () => {
      document.getElementById('lastPrice').textContent = 'ETH: 数据加载中...';
      try {
        const data = await fetchEthPrices();
        const { labels, values } = buildLabelsAndValues(data.prices);
        console.log(labels);
        console.log(values);
        const { min, max, avg } = calcStats(values);
        document.getElementById('lastPrice').textContent = `ETH: $${values[values.length - 1].toFixed(2)}`;
        document.getElementById('minPrice').textContent = `$${min.toFixed(2)}`;
        document.getElementById('maxPrice').textContent = `$${max.toFixed(2)}`;
        document.getElementById('avgPrice').textContent = `$${avg.toFixed(2)}`;
        if (ethChart) {
      ethChart.destroy();
    }
        const chartConfig = {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "ETH / USD",
            data: values,
            borderColor: "#6ee7b7",
            backgroundColor: "rgba(110,231,183,0.2)",
            tension: 0.3,
            fill: true,
            pointRadius: 3,
            pointBackgroundColor: "#34d399",
            borderWidth: 3
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          x: {
            ticks: { color: "#d6d9f2" },
            grid: { display: false }
          },
          y: {
            ticks: {
              color: "#d6d9f2",
              callback: value => "$" + value.toLocaleString(undefined, { maximumFractionDigits: 0 })
            },
            grid: { color: "rgba(255,255,255,0.08)" }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => "$" + ctx.formattedValue
            }
          }
        }
      }
    };
    new Chart(document.getElementById("ethChart"), chartConfig);
      } catch (error) {
        document.getElementById('lastPrice').textContent = 'ETH: 数据加载失败';
        document.getElementById('minPrice').textContent = '--';
        document.getElementById('maxPrice').textContent = '--';
        document.getElementById('avgPrice').textContent = '--';
        console.error(error);
      }
    };

    renderTrend();
  </script>
